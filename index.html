<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperHub - 学术论文搜集平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="HFT.jpg" alt="Logo" class="hft-logo">
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" placeholder="搜索论文标题、作者、关键词..." id="searchInput">
        <kbd class="search-kbd">⌘K</kbd>
      </div>
    </div>
    <div class="header-right">
      <span class="logo-text">PaperHub</span>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">全部论文</div>
          <a href="#" class="nav-item active" data-category="all">
            <span class="nav-icon">📄</span>
            <span>全部</span>
            <span class="nav-count" id="countAll">0</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">领域分类</div>

          <a href="#" class="nav-item" data-category="大模型">
            <span class="nav-dot" style="background: var(--tag-llm)"></span>
            <span>大模型</span>
            <span class="nav-count" id="countLLM">0</span>
          </a>

          <a href="#" class="nav-item" data-category="行为金融">
            <span class="nav-dot" style="background: var(--tag-behavior)"></span>
            <span>行为金融</span>
            <span class="nav-count" id="countBehavior">0</span>
          </a>

          <a href="#" class="nav-item" data-category="巨灾保险">
            <span class="nav-dot" style="background: var(--tag-catastrophe)"></span>
            <span>巨灾保险</span>
            <span class="nav-count" id="countCatastrophe">0</span>
          </a>

          <a href="#" class="nav-item" data-category="农业保险">
            <span class="nav-dot" style="background: var(--tag-agri)"></span>
            <span>农业保险</span>
            <span class="nav-count" id="countAgriculture">0</span>
          </a>

          <a href="#" class="nav-item" data-category="普惠金融">
            <span class="nav-dot" style="background: var(--tag-inclusive)"></span>
            <span>普惠金融</span>
            <span class="nav-count" id="countInclusive">0</span>
          </a>
        </div>

        <div class="nav-section" id="subcategorySection">
          <div class="nav-section-title">子领域</div>
          <div class="subcategory-list" id="subcategoryList">
            <!-- 动态生成 -->
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- 每日推送 -->
      <section class="daily-push" id="dailyPush">
        <div class="daily-push-header">
          <div class="daily-push-title">
            <span class="daily-push-icon">📬</span>
            <span>今日推送</span>
            <span class="daily-push-date" id="pushDate"></span>
          </div>
          <a href="#/push" class="daily-push-more">查看全部 →</a>
        </div>
        <div class="daily-push-grid" id="pushGrid">
          <!-- 推送论文卡片 -->
        </div>
      </section>

      <div class="content-header">
        <h1 class="page-title" id="pageTitle">全部论文</h1>
        <div class="content-filters">
          <select class="filter-select" id="sortSelect">
            <option value="latest">最新发布</option>
            <option value="cited">引用最多</option>
            <option value="popular">热门推荐</option>
          </select>
        </div>
      </div>

      <div class="paper-list" id="paperList">
        <!-- 论文卡片将通过 JS 动态生成 -->
      </div>

      <!-- Loading Skeleton -->
      <div class="skeleton-list" id="skeletonList">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination">
        <!-- 分页将通过 JS 动态生成 -->
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <!-- 热门论文 -->
      <div class="widget">
        <h3 class="widget-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
          </svg>
          热门论文
        </h3>
        <ul class="hot-list" id="hotList">
          <!-- 动态生成 -->
        </ul>
      </div>

      <!-- 热门标签 -->
      <div class="widget">
        <h3 class="widget-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
            <line x1="7" y1="7" x2="7.01" y2="7"></line>
          </svg>
          热门标签
        </h3>
        <div class="tag-cloud" id="tagCloud">
          <!-- 动态生成 -->
        </div>
      </div>

    </aside>
  </div>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <a href="#" class="mobile-nav-item active" data-category="all">
      <span>📄</span>
      <span>全部</span>
    </a>
    <a href="#" class="mobile-nav-item" data-category="大模型">
      <span>🤖</span>
      <span>大模型</span>
    </a>
    <a href="#" class="mobile-nav-item" data-category="行为金融">
      <span>📊</span>
      <span>行为金融</span>
    </a>
    <a href="#" class="mobile-nav-item" data-category="巨灾保险">
      <span>🌪️</span>
      <span>巨灾保险</span>
    </a>
    <a href="#" class="mobile-nav-item" data-category="农业保险">
      <span>🌾</span>
      <span>农业保险</span>
    </a>
    <a href="#" class="mobile-nav-item" data-category="普惠金融">
      <span>💰</span>
      <span>普惠金融</span>
    </a>
  </nav>

  <!-- Paper Detail Modal -->
  <div class="paper-modal" id="paperModal">
    <div class="paper-modal-overlay" onclick="closePaperModal()"></div>
    <div class="paper-modal-content">
      <button class="paper-modal-close" onclick="closePaperModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>

      <div class="paper-modal-body" id="paperModalBody">
        <!-- 动态加载详情内容 -->
      </div>
    </div>
  </div>

  <!-- Author Detail Modal -->
  <div class="paper-modal" id="authorModal">
    <div class="paper-modal-overlay" onclick="closeAuthorModal()"></div>
    <div class="paper-modal-content paper-modal-wide">
      <button class="paper-modal-close" onclick="closeAuthorModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>

      <div class="author-modal-body" id="authorModalBody">
        <!-- 动态加载作者详情 -->
      </div>
    </div>
  </div>

  <!-- Citation Export Modal -->
  <div class="paper-modal" id="citationModal">
    <div class="paper-modal-overlay" onclick="closeCitationModal()"></div>
    <div class="paper-modal-content paper-modal-small">
      <button class="paper-modal-close" onclick="closeCitationModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>

      <div class="citation-modal-body" id="citationModalBody">
        <!-- 动态加载引用格式 -->
      </div>
    </div>
  </div>

  <!-- PDF Viewer Modal -->
  <div class="paper-modal" id="pdfModal">
    <div class="paper-modal-overlay" onclick="closePdfModal()"></div>
    <div class="paper-modal-content paper-modal-wide pdf-modal-content">
      <button class="paper-modal-close" onclick="closePdfModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>

      <div class="pdf-modal-header">
        <h3 class="pdf-modal-title" id="pdfModalTitle">论文预览</h3>
        <div class="pdf-modal-actions">
          <button class="pdf-action-btn" id="pdfDownloadBtn" onclick="downloadPdf()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            下载 PDF
          </button>
          <a href="#" class="pdf-action-btn pdf-action-primary" id="pdfOpenBtn" target="_blank">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            在新窗口打开
          </a>
        </div>
      </div>

      <div class="pdf-viewer-container" id="pdfViewerContainer">
        <iframe id="pdfViewer" src="" frameborder="0"></iframe>
      </div>

      <div class="pdf-no-source" id="pdfNoSource" style="display: none;">
        <div class="pdf-no-source-icon">📄</div>
        <h4>暂无可用 PDF</h4>
        <p>该论文暂无 PDF 资源，您可以：</p>
        <div class="pdf-alternatives">
          <button class="pdf-alt-btn" onclick="searchPaperOnline()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="M21 21l-4.35-4.35"></path>
            </svg>
            百度学术搜索
          </button>
          <button class="pdf-alt-btn" onclick="requestPdf()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            邮件请求
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
